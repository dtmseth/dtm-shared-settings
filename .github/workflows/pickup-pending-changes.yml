name: pickup-pending-changes

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  # `actions: write` is needed so the pickup script can dispatch the
  # publish-settings-on-merge workflow after auto-merging a general PR
  # (GitHub's GITHUB_TOKEN recursion guard otherwise swallows the
  # pull_request:closed event that would normally trigger publish).
  actions: write

concurrency:
  group: pickup-pending-changes
  cancel-in-progress: false

jobs:
  pickup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install script dependencies
        run: pip install --quiet -r scripts/requirements.txt

      - name: Acquire Graph access token (client credentials)
        id: graph-token
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token" \
            -d "client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -d "scope=https://graph.microsoft.com/.default" \
            -d "grant_type=client_credentials")
          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run pickup script
        env:
          GRAPH_ACCESS_TOKEN: ${{ steps.graph-token.outputs.token }}
          SHAREPOINT_SITE_ID: ${{ secrets.SHAREPOINT_SITE_ID }}
          SHAREPOINT_DRIVE_ID: ${{ secrets.SHAREPOINT_DRIVE_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SETTINGS_SUBDIR: resources/config
          MAIN_BRANCH: main
        run: python scripts/pickup_pending_changes.py
